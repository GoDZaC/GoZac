<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            background-color: #fdf0f5;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            color: #ff3366;
            font-size: 60px;
            margin-bottom: 20px;
        }
        p {
            font-size: 24px;
            color: #555555;
            line-height: 1.5;
        }
        .surprise-btn {
            background-color: #ff3366;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }
        .surprise-btn:hover {
            background-color: #e60039;
            transform: scale(1.05);
        }
        #message {
            display: none;
            margin-top: 30px;
            font-size: 28px;
            color: #ff6699;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎉 Happy Birthday! 🎂</h1>
    <p>ขอให้มีความสุขมากๆ สุขภาพร่างกายแข็งแรง สมหวังทุกประการนะครับ!</p>
    
    <button class="surprise-btn" onclick="showSurprise()">กดรับคำอวยพรพิเศษ!</button>
    
    <div id="message">✨ ขอให้วันนี้เป็นวันที่ดีที่สุดของคุณนะ! ✨</div>

    <script>
        function showSurprise() {
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
